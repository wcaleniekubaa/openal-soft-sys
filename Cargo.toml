[package]
name = "openal-soft-sys"
version = "0.1.0"
edition = "2021"
authors = ["wcaleniekubaa"]
description = "crate that provides ffi interface to openal-soft library"
readme = "README.md"
license = "LGPL-2.0"
keywords = ["audio", "openal", "openal-soft", "ffi"]


[build-dependencies]
cmake = { version = "0.1.50", optional = true }

[features]
default = [
    "check_dlopen",
    "enable_legacy_eax",
    "enable_sse",
    "enable_sse2",
    "enable_sse3",
    "enable_sse4_1",
    "enable_arm_neon",
    "enable_sse2_codegen",
    "enable_rtkit",
    "enable_pipewire",
    "enable_pulseaudio",
    "enable_alsa",
    "enable_oss",
    "enable_solaris",
    "enable_sndio",
    "enable_winmm",
    "enable_directsound",
    "enable_wasapi",
    "enable_jack",
    "enable_coreaudio",
    "enable_oboe",
    "enable_opensl",
    "enable_portaudio",
    "enable_wave_writer",
    "dynamic_link",
]
bundled = ["dep:cmake"]
dynamic_link = []
check_dlopen = []
enable_legacy_eax = []
enable_sse = []
require_sse = ["enable_sse"]
enable_sse2 = []
require_sse2 = ["enable_sse2"]
enable_sse2_codegen = []
enable_sse3 = []
require_sse3 = ["enable_sse3"]
enable_sse4_1 = []
require_sse4_1 = ["enable_sse4_1"]
enable_arm_neon = []
require_arm_neon = ["enable_arm_neon"]
enable_rtkit = []
require_rtkit = ["enable_rtkit"]
enable_pipewire = []
require_pipewire = ["enable_pipewire"]
enable_pulseaudio = []
require_pulseaudio = ["enable_pulseaudio"]
enable_alsa = []
require_alsa = ["enable_alsa"]
enable_oss = []
require_oss = ["enable_oss"]
enable_solaris = []
require_solaris = ["enable_solaris"]
enable_sndio = []
require_sndio = ["enable_sndio"]
enable_winmm = []
require_winmm = ["enable_winmm"]
enable_directsound = []
require_directsound = ["enable_directsound"]
enable_wasapi = []
require_wasapi = ["enable_wasapi"]
enable_jack = []
require_jack = ["enable_jack"]
enable_coreaudio = []
require_coreaudio = ["enable_coreaudio"]
enable_oboe = []
require_oboe = ["enable_oboe"]
enable_opensl = []
require_opensl = ["enable_opensl"]
enable_portaudio = []
require_portaudio = ["enable_portaudio"]
enable_sdl2 = []
require_sdl2 = ["enable_sdl2"]
enable_wave_writer = []
require_wave_writer = ["enable_wave_writer"]
static_crt = []
static_cxxrt = []
static_winpthread = []
